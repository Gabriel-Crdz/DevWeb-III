<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .card-container{
            display: flex;

        }

        .card{
            width: 20%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: solid black 1px;
        }
    </style>
</head>
<body>
    <h1>Home Page</h1>

    <!--Binding: vinculação entre os atributos no java com o html-->
    <span>Turma:</span>
    <p th:text="${turma}"></p>

    <span>Ano:</span>
    <p th:text="${ano}"></p> 

    <h1>Pessoas:</h1>

    <div class="card-container">
        <!--"foreach"-->
        <div th:each="nome: ${lista}" class="card"> 
            <p th:text="${nome}"></p>
        </div> 
    </div>
    

    </div>
</body>
</html>
