<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .invalid-feedback{
            display: block;
        }
    </style>
<body>

    <div class="contanier">
        <form th:action="@{/estudantes/salvar}" method="post" 
        enctype="multipart/form-data" th:object="${estudante}"> <!--"enctype": atributo que informa que um arquivo sera enviado--> <!--"th:object": o spring passa a associar esse form com o objeto-->

            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}"> <!-- So mostra seu conteudo se houver erros. AVISO: por padrão aparece oculto-->
                <span th:errors="*{nome}"></span>
            </div>

            <div class="mb-3 p-3">
                <label class="form-label">Nome:</label>
                <input type="text" class="form-control" name="nome" th:field="*{nome}"> <!--th:field: Faz a persistencia do value-->
            </div>
            
            <div class="mb-3 p-3">
                <label class="form-label">Data de Ingresso:</label>
                <input type="date" class="form-control" name="dataIngresso">
            </div>
            
            <!--CheckBox para lista: habilidades-->
            <div class="mb-3 p-3">
                <label>
                    <input type="checkbox" class="form-check-input" name="habilidades" value="HTML"> HTML
                </label>
                
                <label>
                    <input type="checkbox" class="form-check-input" name="habilidades" value="CSS"> CSS <!--Para tipo "List" o Java entende normalmente com qualuer outro tipo-->
                </label>
                
                <label>
                    <input type="checkbox" class="form-check-input" name="habilidades" value="JS"> JS
                </label>
            </div>
            
            <!--Envio de Arquivo-->
            <div class="mb-3 p-3">
                <label class="form-label">Nome:</label>
                <input type="file" class="form-control" name="avatar">
            </div>

            <div class="mb-3 p-3">
                <input type="submit" class="btn btn-success">
            </div>

        </form>
    </div>

</body>

</html>
