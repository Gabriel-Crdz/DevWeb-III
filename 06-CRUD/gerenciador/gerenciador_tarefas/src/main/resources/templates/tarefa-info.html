<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
    <title>Detalhes da tarefa</title>
</head>

<body>
    <div class="container mt-5">
        <div class="card text-center">
            <h2 class="card-header">
                <span th:text="${tarefa.titulo}"></span>
            </h2>
            <ul class="list-group list-group-flush">
                <li class="list-group-item" th:text="${tarefa.data}"></li>
                <li class="list-group-item" th:text="${tarefa.descricao}"></li>
                <li class="list-group-item" th:text="${tarefa.estado.descricao}"></li>
            </ul>
        </div>
        <div>
            <a th:href="@{/tarefas}" class="btn btn-secondary mt-4 border border-dark">Voltar</a>
            <a class="btn btn-secondary mt-4 border border-dark" th:href="@{/tarefas/editar/{id}(id=${tarefa.id})}">Editar</a>
        </div>
    </div>
</body>

</html>
