<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-size: 1.5rem;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            color: red;
            text-decoration: underline;
        }
    </style>
    <title>Lista tarefas</title>
</head>

<body>
    <div class="container mt-5">
        <table class="table table-bordered table-striped table-dark table-hover">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Título</th>
                    <th>Data</th>
                    <th>Estado</th>
                    <th>Opções</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${tarefas}">
                    <td th:text="${t.id}"></td>
                    <td><a th:text="${t.titulo}" th:href="@{/tarefas/info/{id}(id=${t.id})}"></a></td>
                    <td th:text="${t.data}"></td>
                    <td th:text="${t.estado.descricao}"></td>
                    <td>
                        <a class="btn btn-warning" th:href="@{/tarefas/editar/{id}(id=${t.id})}">Editar</a>
                        <a class="btn btn-danger" th:href="@{/tarefas/remover/{id}(id=${t.id})}">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Botões de navegação -->
        <div>
            <a class="btn btn-info border border-dark" th:href="@{/tarefas/cadastrar}">Cadastrar</a>
            <a class="btn btn-info border border-dark" th:href="@{/tarefas}">Todas</a>  
            <a class="btn btn-info border border-dark" th:href="@{/tarefas/andamento}">Em andamento</a>
        </div>
    </div>
</body>

</html>
